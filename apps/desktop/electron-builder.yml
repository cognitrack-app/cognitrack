# CogniTrack Desktop — electron-builder configuration
# Produces: NSIS installer (.exe) + portable exe for Windows

appId: com.cognitrack.desktop
productName: CogniTrack
copyright: Copyright © 2026 CogniTrack

# ── Directories ────────────────────────────────────────────────────

directories:
  output: dist
  buildResources: build

# ── Files included in the package ─────────────────────────────────

files:
  - dist-electron/**
  - dist-renderer/**
  - assets/**
  - package.json

extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*.png'
      - '**/*.ico'

# ── Custom URI scheme (deep-link for Google OAuth callback) ─────────────
#
# Registers cognitrack:// in the Windows registry (HKCR\cognitrack) during
# NSIS install so the OS can route cognitrack://auth?code=... back to the app.
# On macOS this is declared in Info.plist CFBundleURLTypes automatically.
#
# After install, verify with:
#   reg query HKCR\cognitrack  (Windows)
#   /usr/bin/plutil -p CogniTrack.app/Contents/Info.plist | grep -A5 URL  (macOS)

protocols:
  - name: CogniTrack Auth
    schemes:
      - cognitrack

# ── Windows targets ─────────────────────────────────────────────

win:
  # Icon must be a 256x256+ .ico file
  icon: build/icon.ico
  # asInvoker = no UAC elevation prompt on launch.
  # CogniTrack never needs admin rights for tracking.
  # Protocol registration is written to HKCU (per-user) by electron-builder,
  # which does NOT require elevation.
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis        # Full installer with uninstaller
      arch: [x64]
    - target: portable    # Single .exe, no install needed
      arch: [x64]

# ── NSIS installer options ─────────────────────────────────────

nsis:
  oneClick: false                          # Show installer UI
  allowToChangeInstallationDirectory: true
  # allowElevation must stay false when requestedExecutionLevel is asInvoker.
  # Protocol registration uses HKCU (per-user) — no admin needed.
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CogniTrack
  runAfterFinish: true                     # Launch app after install
  perMachine: false                        # Per-user install (no admin required)

# ── Native modules (better-sqlite3 / active-win need rebuilding) ────────

asar: true
asarUnpack:
  # Native .node binaries cannot be inside an asar archive
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/active-win/**'

# ── Rebuild native modules against Electron’s Node version ────────────

beforePackHook: node scripts/rebuild-natives.js

